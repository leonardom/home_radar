services:
  backend-api:
    build:
      context: ../../backend-api
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/home_radar
    depends_on:
      - postgres
    restart: unless-stopped

  scheduler:
    build:
      context: ../../backend-api
      dockerfile: Dockerfile
      target: runner
    container_name: scheduler
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/home_radar
      - SCRAPER_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/home_radar
      - SCRAPER_SYNC_RETRY_ATTEMPTS=3
      - SENDGRID_API_KEY=
      - EMAIL_FROM=no-reply@home-radar.local
      - NOTIFICATIONS_MAX_ATTEMPTS=3
    volumes:
      - ./scheduler.crontab:/etc/crontabs/root:ro
    command: ["crond", "-f", "-l", "8"]
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=home_radar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
